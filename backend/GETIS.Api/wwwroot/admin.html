<!--
  admin.html - Admin Dashboard for GETIS
  - Login (simple client-side) -> then shows sidebar + main dashboard
  - Table of bookings loaded from localStorage
  - Links to admin.css and script.js
  
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GETIS Admin Dashboard</title>

  <!-- Tailwind utilities for quick layout helpers -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome (icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Custom admin CSS -->
  <link rel="stylesheet" href="admin.css">
</head>

<body class="admin-body">

  <!-- =====================================
       LOGIN SCREEN (visible on page load)
  ========================================== -->
  <div id="loginScreen" class="login-container">
       <div class="login-box">
          <h2 class="login-title">Admin Login</h2>
          <!-- Hidden decoy fields: browsers look for a "form" shape (username + password)
               before deciding whether to offer to save credentials. Giving them a fake,
               invisible one here — instead of none at all — is more reliable at stopping
               autofill than autocomplete="off" alone, which Chrome/Edge often ignore. -->
          <input type="text" name="fake-username" autocomplete="username" style="display:none" tabindex="-1" aria-hidden="true" />
          <input
            id="adminPass"
            class="login-input"
            type="password"
            placeholder="Enter admin password"
            autocomplete="new-password"
            name="admin-pass-field"
          />
          <button onclick="checkLogin()" class="login-btn">Login</button>
          <p id="loginMsg" class="mt-3 text-sm text-red-600"></p>
      </div>
  </div>

  <!-- ============================
       SIDEBAR (hidden until login)
  ============================ -->
  <aside class="sidebar hidden" aria-hidden="true">
    <div class="sidebar-header">
      <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Admin avatar" class="admin-avatar mx-auto">
      <h3 class="admin-title text-center mt-3">GETIS Admin</h3>
    </div>

    <nav class="sidebar-nav mt-4">
      <a href="#" class="sidebar-link active"><i class="fa fa-table mr-3"></i>Booking Records</a>
      <a href="index.html" class="sidebar-link"><i class="fa fa-home mr-3"></i>View Website</a>
      <a href="#" onclick="logout()" class="sidebar-link"><i class="fa fa-sign-out-alt mr-3"></i>Logout</a>
    </nav>
  </aside>

  <!-- ============================
       MAIN CONTENT (hidden until login)
       (Booking table + actions)
  ============================ -->
  <main class="main-content hidden" id="adminMain" aria-hidden="true">
    <div class="top-bar mb-6">
       <h1 class="page-title">Booking Records</h1>
    </div>

    <!-- Table card (scrollable on small screens) -->
    <section class="card">
      <div class="overflow-x-auto">
        <table class="records-table w-full text-left">
          <thead>
            <tr>
              <th class="px-4 py-3">#</th>
              <th class="px-4 py-3">Name</th>
              <th class="px-4 py-3">Email</th>
              <th class="px-4 py-3">Date</th>
              <th class="px-4 py-3">Destination</th>
              <th class="px-4 py-3">Package</th>
              <th class="px-4 py-3">Action</th>
            </tr>
          </thead>
          <tbody id="recordsBody">
            <!-- Rows injected by script.js -->
          </tbody>
        </table>
      </div>
    </section>

    <!-- Action buttons -->
    <div class="actions mt-4">
      <button onclick="downloadCSV()" class="btn csv"><i class="fa fa-file-csv mr-2"></i>Download CSV</button>
      <button onclick="downloadJSON()" class="btn json"><i class="fa fa-file-code mr-2"></i>Download JSON</button>
    </div>
  </main>

  <!-- Script with admin + booking logic -->
  <script src="script.js"></script>
</body>
</html>
